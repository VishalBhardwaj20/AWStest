<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text3 — AWStest</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --surface: #111827; --accent: #38bdf8;
      --accent2: #a78bfa; --text: #e2e8f0; --muted: #64748b; --border: #1e2d42;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Syne', sans-serif; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px; opacity: 0.3; z-index: 0;
    }
    .wrapper {
      position: relative; z-index: 1; text-align: center; padding: 40px 24px;
      animation: fadeUp 0.7s ease both;
    }
    .badge {
      display: inline-block; font-family: 'Space Mono', monospace;
      font-size: 11px; color: var(--accent); border: 1px solid var(--accent);
      padding: 4px 14px; border-radius: 2px; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 28px;
    }
    h1 {
      font-size: clamp(2.8rem, 8vw, 5rem); font-weight: 800;
      line-height: 1.05; letter-spacing: -2px; margin-bottom: 20px;
    }
    h1 span { color: var(--accent2); }
    .sub {
      font-family: 'Space Mono', monospace; font-size: 13px;
      color: var(--muted); margin-bottom: 40px; line-height: 1.8;
    }
    .meta {
      display: flex; justify-content: center; gap: 24px; flex-wrap: wrap;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted);
    }
    .meta span { color: var(--accent); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="badge">AWStest · text3.html</div>
    <h1>This is<br><span>text3</span></h1>
    <p class="sub">
      New file created & pushed to AWStest repo.<br>
      Branch: master &nbsp;·&nbsp; Repo: VishalBhardwaj20/AWStest
    </p>
    <div class="meta">
      <div>Created by <span>Claude AI</span></div>
      <div>Author <span>Vishal Bhardwaj</span></div>
      <div>March <span>2026</span></div>
    </div>
  </div>
</body>
</html>
